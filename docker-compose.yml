services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mobile:
    build:
      context: ./MT
      dockerfile: Dockerfile
    ports:
      - "81:81"
    depends_on:
      - backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 7.9.2：使用 LibreOffice 7.3.5.2（issue#516 中 7.4.1.2 会 exit 5，7.3.5.2 正常）
  gotenberg:
    image: gotenberg/gotenberg:7.9.2
    ports:
      - "3000:3000"
    restart: always
    command: ["gotenberg", "--api-timeout=300s"]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./server/templete.docx:/app/templete.docx
      - backend_uploads:/app/uploads
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/carbon_platform
      - JWT_SECRET=a_very_secure_and_random_secret_string_for_jwt
      - AI_SERVICE_URL=http://ai_service:8000
      - PORT=8080
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=deepseek-r1:8b
      - GOTENBERG_URL=http://gotenberg:3000
      - DEBUG_REPORT_XML=${DEBUG_REPORT_XML:-}
    depends_on:
      - ai_service
      - mongodb
      - ollama
      - gotenberg
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  mongodb: # 添加 mongodb 服务
    image: docker.m.daocloud.io/library/mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU 支持配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes: # 定义数据卷
  mongodb_data:
  ollama_data:
  backend_uploads: # 教学视频等上传文件持久化
