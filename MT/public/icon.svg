<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="#0a0e27"/>
  <!-- 外圈装饰 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#66bb6a" stroke-width="8"/>
  <!-- CO2 文字 -->
  <text x="256" y="220" font-size="180" text-anchor="middle" fill="#66bb6a" font-family="Arial, sans-serif" font-weight="bold">CO</text>
  <text x="256" y="340" font-size="140" text-anchor="middle" fill="#66bb6a" font-family="Arial, sans-serif" font-weight="bold">₂</text>
  <!-- 装饰线条 -->
  <line x1="120" y1="120" x2="160" y2="160" stroke="#42a5f5" stroke-width="4"/>
  <line x1="392" y1="120" x2="352" y2="160" stroke="#42a5f5" stroke-width="4"/>
  <line x1="120" y1="392" x2="160" y2="352" stroke="#42a5f5" stroke-width="4"/>
  <line x1="392" y1="392" x2="352" y2="352" stroke="#42a5f5" stroke-width="4"/>
</svg>
































